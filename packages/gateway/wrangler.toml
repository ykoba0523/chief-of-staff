name = "chief-of-staff-gateway"
main = "src/index.ts"
compatibility_date = "2025-03-10"

# [vars]
# API_ENDPOINT = ""  # Mastra Cloud のエンドポイント
# MASTRA_SHARED_SECRET = ""  # 共有シークレット

# Secrets (wrangler secret put で設定):
# - SLACK_SIGNING_SECRET
# - MASTRA_API_URL
# - MASTRA_SHARED_SECRET

[[kv_namespaces]]
binding = "CONVERSATION_HISTORY"
id = "6dc92775bc434f91a70e0815583d272d"

# 定時Push: JST 9:00 / 12:30 / 17:00 (平日のみ, UTC基準)
[triggers]
crons = ["0 0 * * MON-FRI", "30 3 * * MON-FRI", "0 8 * * MON-FRI"]
